<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrokersBloc Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 2rem;
      text-align: center;
    }

    h1 { color: #1a1a2e; margin-bottom: 0.25rem; }
    h2 { color: #333; }

    /* ── LOGIN ── */
    #login-section {
      max-width: 360px;
      margin: 4rem auto;
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    #login-section input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    #login-section .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    /* ── BUTTONS ── */
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
    }

    button:hover { background-color: #0056b3; }

    button.secondary {
      background-color: #6c757d;
    }
    button.secondary:hover { background-color: #545b62; }

    button.danger {
      background-color: #dc3545;
    }
    button.danger:hover { background-color: #b02a37; }

    /* ── DASHBOARD TOOLBAR ── */
    #dashboard-toolbar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    #dashboard-toolbar button {
      flex: 0 1 auto;
    }

    /* ── SUMMARY CARDS ── */
    #rfp-summary {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #dce3f0;
      border-radius: 10px;
      padding: 1rem 1.75rem;
      min-width: 180px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .summary-card .label {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #007bff;
      margin-top: 0.2rem;
    }

    .summary-card.closed .value { color: #28a745; }

    /* ── RFP CARDS ── */
    #rfp-list {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }

    .rfp-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.09);
      border-left: 5px solid #007bff;
    }

    .rfp-card.stage-done {
      border-left-color: #28a745;
    }

    .rfp-card-title {
      font-size: 1.05rem;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 0.75rem;
    }

    /* ── STAGE PROGRESS ── */
    .stage-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-bottom: 0.85rem;
    }

    .stage-step {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .stage-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #e9ecef;
      color: #888;
      white-space: nowrap;
    }

    .stage-pill.completed {
      background: #d4edda;
      color: #28a745;
    }

    .stage-pill.active {
      background: #007bff;
      color: #fff;
    }

    .stage-arrow {
      color: #ccc;
      font-size: 0.75rem;
    }

    /* ── CARD META ── */
    .rfp-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.88rem;
      color: #555;
    }

    .rfp-meta span strong {
      color: #1a1a2e;
    }

    .lives-value {
      color: #007bff;
      font-weight: bold;
    }

    /* ── STATUS MESSAGES ── */
    #rfp-loading { color: #666; font-style: italic; margin: 2rem 0; }
    #rfp-error   { color: #dc3545; margin: 2rem 0; }

    /* ── 300 CLUB PROGRESS BAR ── */
    #progress-section {
      max-width: 860px;
      margin: 0 auto 1.75rem;
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.09);
      text-align: left;
    }

    #progress-section .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.6rem;
    }

    #progress-section .progress-label span {
      color: #28a745;
    }

    .progress-track {
      background: #e9ecef;
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #28a745, #20c997);
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .progress-fill.complete {
      background: linear-gradient(90deg, #f7b731, #f9ca24, #f0932b);
    }

    /* ── GOLDEN TICKET BUTTON ── */
    #golden-ticket-container {
      display: none;
      margin-top: 1.25rem;
      text-align: center;
    }

    #golden-ticket-btn {
      background: linear-gradient(135deg, #f7b731 0%, #f9ca24 40%, #f0932b 100%);
      color: #5a3800;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      flex: unset;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(247, 183, 49, 0.55);
      animation: ticketPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #golden-ticket-btn::after {
      content: "";
      position: absolute;
      top: 0; left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      animation: shimmer 2.2s infinite;
    }

    #golden-ticket-btn:hover {
      background: linear-gradient(135deg, #f9ca24 0%, #f7b731 50%, #e58a00 100%);
      box-shadow: 0 6px 24px rgba(247, 183, 49, 0.7);
      transform: translateY(-1px);
    }

    @keyframes shimmer {
      0%   { left: -75%; }
      60%  { left: 125%; }
      100% { left: 125%; }
    }

    @keyframes ticketPop {
      0%   { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ── GOLDEN TICKET MODAL ── */
    #golden-ticket-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    #golden-ticket-modal.open {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .gt-modal-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2.25rem 2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      border-top: 6px solid #f7b731;
      animation: cardSlideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .gt-modal-close {
      position: absolute;
      top: 1rem; right: 1.1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #aaa;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex: unset;
    }

    .gt-modal-close:hover { color: #555; background: none; }

    .gt-ticket-icon {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
    }

    .gt-modal-card h3 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a2e;
      margin: 0 0 0.5rem;
    }

    .gt-modal-card p {
      font-size: 0.97rem;
      color: #555;
      margin: 0 0 1.5rem;
      line-height: 1.5;
    }

    .gt-claim-btn {
      background: linear-gradient(135deg, #f7b731, #f0932b);
      color: #fff;
      border: none;
      padding: 13px 30px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      flex: unset;
      box-shadow: 0 3px 12px rgba(240,147,43,0.45);
      letter-spacing: 0.02em;
    }

    .gt-claim-btn:hover {
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      box-shadow: 0 5px 18px rgba(240,147,43,0.6);
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-section">
    <h2>BrokersBloc Tracker</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <div class="btn-row">
      <button onclick="verifyBroker()">Login</button>
      <button class="secondary" onclick="window.open('https://brokersbloc.com/register/', '_blank')">Register</button>
    </div>
    <p id="login-error" style="color:red; margin-top:0.75rem;"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-section" style="display:none;">
    <h2 id="welcome-msg"></h2>

    <div id="dashboard-toolbar">
      <button onclick="openRfpForm()">Submit New RFP</button>
      <button class="secondary" onclick="loadDashboard()">Refresh Tracker</button>
      <button class="danger" onclick="logout()">Logout</button>
    </div>

    <!-- SUMMARY STATS -->
    <div id="rfp-summary" style="display:none">
      <div class="summary-card">
        <div class="label">Total Lives Submitted</div>
        <div class="value" id="total-lives">0</div>
      </div>
      <div class="summary-card closed">
        <div class="label">Lives Closed</div>
        <div class="value" id="closed-lives">0</div>
      </div>
    </div>

    <!-- 300 CLUB PROGRESS -->
    <div id="progress-section" style="display:none">
      <div class="progress-label">
        <span id="progress-text">Progress to 300 Club</span>
        <span id="progress-count">0 / 300</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <!-- Golden Ticket — revealed at 300 lives closed -->
      <div id="golden-ticket-container">
        <button id="golden-ticket-btn" onclick="claimGoldenTicket()">
          🎫 Claim Your Golden Ticket
        </button>
      </div>
    </div>

    <!-- Golden Ticket Modal -->
    <div id="golden-ticket-modal">
      <div class="gt-modal-card">
        <button class="gt-modal-close" onclick="closeGoldenTicket()" aria-label="Close">×</button>
        <div class="gt-ticket-icon">🎫✨</div>
        <h3>You're in the 300 Club!</h3>
        <p>You've closed <strong>300+ lives</strong> — an elite milestone. Your Golden Ticket unlocks exclusive membership perks and recognition in the BrokersBloc community.</p>
        <button class="gt-claim-btn" onclick="openGoldenTicketLink()">Join the 300 Club →</button>
      </div>
    </div>

    <p id="rfp-loading" style="display:none"></p>
    <p id="rfp-error"   style="display:none"></p>

    <!-- RFP CARDS -->
    <div id="rfp-list"></div>
  </div>

  <script>
    const STAGES = [
      "Census Received",
      "Processing",
      "Engaging Carriers",
      "Preparing Quote",
      "Quote Returned",
      "Sold"
    ];

    function buildStageBar(currentStage) {
      const currentIdx = STAGES.indexOf(currentStage);
      return STAGES.map((stage, i) => {
        let cls = "stage-pill";
        if (i < currentIdx)  cls += " completed";
        if (i === currentIdx) cls += " active";
        const arrow = i < STAGES.length - 1 ? `<span class="stage-arrow">›</span>` : "";
        return `<div class="stage-step"><span class="${cls}">${stage}</span>${arrow}</div>`;
      }).join("");
    }

    async function verifyBroker() {
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("login-error");
      errEl.textContent = "";

      // Always clear stale session before attempting login
      sessionStorage.clear();

      try {
        const res  = await fetch(`/api/verify-broker?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem("brokerName",     data.brokerName);
          sessionStorage.setItem("brokerEmail",    email);
          sessionStorage.setItem("brokerPassword", password);
          loadDashboard();
        } else {
          errEl.textContent = data.error || "Invalid email or password.";
        }
      } catch (e) {
        errEl.textContent = "Could not connect. Please try again.";
      }
    }

    async function loadDashboard() {
      const name = sessionStorage.getItem("brokerName");
      if (!name) return;

      document.getElementById("login-section").style.display     = "none";
      document.getElementById("dashboard-section").style.display = "block";
      document.getElementById("welcome-msg").textContent         = `Welcome, ${name}`;

      const loadingEl  = document.getElementById("rfp-loading");
      const errorEl    = document.getElementById("rfp-error");
      const summaryEl  = document.getElementById("rfp-summary");
      const listEl     = document.getElementById("rfp-list");
      const totalEl    = document.getElementById("total-lives");
      const closedEl   = document.getElementById("closed-lives");
      const progressEl = document.getElementById("progress-section");
      const fillEl     = document.getElementById("progress-fill");
      const countEl    = document.getElementById("progress-count");

      // reset
      loadingEl.textContent   = "Loading your RFPs...";
      loadingEl.style.display = "block";
      errorEl.style.display   = "none";
      summaryEl.style.display = "none";
      progressEl.style.display = "none";
      listEl.innerHTML        = "";

      try {
        const email    = sessionStorage.getItem("brokerEmail");
        const res      = await fetch(`/api/projects?email=${encodeURIComponent(email)}`);
        if (!res.ok) throw new Error("Failed to load RFPs");
        const projects = await res.json();

        loadingEl.style.display = "none";

        if (!projects.length) {
          loadingEl.textContent   = "No RFPs found.";
          loadingEl.style.display = "block";
          return;
        }

        let totalLives = 0;
        let closedLives = 0;

        projects.forEach(p => {
          const lives = p.livesSubmitted;
          if (typeof lives === "number") {
            totalLives += lives;
            if (p.stage === "Sold") closedLives += lives;
          }

          const isDone      = p.stage === "Sold";
          const livesHTML   = lives != null
            ? `<span class="lives-value">${lives.toLocaleString()}</span>`
            : `<span style="color:#aaa;font-style:italic">Not set</span>`;

          const card = document.createElement("div");
          card.className = `rfp-card${isDone ? " stage-done" : ""}`;
          card.innerHTML = `
            <div class="rfp-card-title">${p.projectName}</div>
            <div class="stage-bar">${buildStageBar(p.stage)}</div>
            <div class="rfp-meta">
              <span><strong>Lives Submitted:</strong> ${livesHTML}</span>
            </div>
          `;
          listEl.appendChild(card);
        });

        totalEl.textContent     = totalLives.toLocaleString();
        closedEl.textContent    = closedLives.toLocaleString();
        summaryEl.style.display = "flex";

        // 300 Club progress bar
        const goal    = 300;
        const pct     = Math.min(closedLives / goal * 100, 100).toFixed(1);
        fillEl.style.width  = pct + "%";
        countEl.textContent = `${closedLives.toLocaleString()} / ${goal}`;
        progressEl.style.display = "block";

        // Golden Ticket — unlock at 300 lives closed
        const goldenContainer = document.getElementById("golden-ticket-container");
        const progressText    = document.getElementById("progress-text");
        if (closedLives >= goal) {
          fillEl.classList.add("complete");
          progressText.textContent = "🏆 300 Club — Achieved!";
          goldenContainer.style.display = "block";
        } else {
          fillEl.classList.remove("complete");
          progressText.textContent = "Progress to 300 Club";
          goldenContainer.style.display = "none";
        }

      } catch (err) {
        loadingEl.style.display = "none";
        errorEl.textContent     = "Could not load RFPs: " + err.message;
        errorEl.style.display   = "block";
      }
    }

    function openRfpForm() {
      const name     = sessionStorage.getItem("brokerName");
      const email    = sessionStorage.getItem("brokerEmail");
      const password = sessionStorage.getItem("brokerPassword");
      const url = `https://airtable.com/appTl5b0TOB6Sh8N5/pagd8oOz2RO9zbYGb/form?prefill_Username=${encodeURIComponent(name)}&prefill_Email=${encodeURIComponent(email)}&prefill_Password=${encodeURIComponent(password)}`;
      window.open(url, "_blank");
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function claimGoldenTicket() {
      document.getElementById("golden-ticket-modal").classList.add("open");
    }

    function closeGoldenTicket() {
      document.getElementById("golden-ticket-modal").classList.remove("open");
    }

    function openGoldenTicketLink() {
      // TODO: replace with the actual 300 Club landing page URL
      window.open("https://brokersbloc.com/300-club/", "_blank");
    }

    // Close modal on backdrop click
    document.getElementById("golden-ticket-modal").addEventListener("click", function(e) {
      if (e.target === this) closeGoldenTicket();
    });

    // auto-restore session
    if (sessionStorage.getItem("brokerName")) {
      loadDashboard();
    }
  </script>

</body>
</html>
